<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Genius Educa - Portal</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; background: #f0f2f5; }
        .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
        header { background: white; padding: 20px; margin-bottom: 20px; border-radius: 8px; display: flex; justify-content: space-between; align-items: center; }
        header h1 { color: #05b6a8; }
        .btn { background: #05b6a8; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; margin: 5px; }
        .btn:hover { background: #049b92; }
        .btn-danger { background: #f76811; }
        .btn-danger:hover { background: #e55a00; }
        .content { background: white; padding: 20px; border-radius: 8px; }
        .tabs { display: flex; gap: 10px; margin-bottom: 20px; }
        .tab-btn { padding: 10px 20px; background: #ddd; border: none; cursor: pointer; border-radius: 5px; }
        .tab-btn.active { background: #05b6a8; color: white; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; font-weight: bold; }
        .form-group input, .form-group select { width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 5px; }
        .card { background: #f9f9f9; padding: 15px; margin: 10px 0; border-left: 4px solid #05b6a8; border-radius: 5px; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 1000; align-items: center; justify-content: center; }
        .modal.active { display: flex; }
        .modal-content { background: white; padding: 30px; border-radius: 8px; max-width: 600px; max-height: 80vh; overflow-y: auto; }
        .close { float: right; font-size: 28px; cursor: pointer; }
        .error { color: red; padding: 10px; background: #ffe0e0; margin: 10px 0; border-radius: 5px; }
        .success { color: green; padding: 10px; background: #e0ffe0; margin: 10px 0; border-radius: 5px; }
        .loading { text-align: center; padding: 20px; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div>
                <h1>🦉 Genius Educa</h1>
                <p>Fichas y Rutinas de Estimulación</p>
            </div>
            <div>
                <span id="userName">Bienvenido</span>
                <button class="btn btn-danger" onclick="logout()">Cerrar Sesión</button>
            </div>
        </header>

        <!-- Pantalla de Login/Registro -->
        <div id="authScreen" class="content">
            <h2>Acceso al Portal</h2>
            
            <div id="loginSection">
                <h3>Iniciar Sesión</h3>
                <div class="form-group">
                    <label>Email:</label>
                    <input type="email" id="loginEmail" placeholder="tu@email.com">
                </div>
                <div class="form-group">
                    <label>Contraseña:</label>
                    <input type="password" id="loginPassword" placeholder="Tu contraseña">
                </div>
                <button class="btn" onclick="login()">Iniciar Sesión</button>
                <button class="btn" onclick="toggleAuth()">¿No tienes cuenta? Regístrate</button>
                <div id="loginError"></div>
            </div>

            <div id="registerSection" style="display:none;">
                <h3>Crear Cuenta</h3>
                <div class="form-group">
                    <label>Nombre:</label>
                    <input type="text" id="registerName" placeholder="Tu nombre">
                </div>
                <div class="form-group">
                    <label>Email:</label>
                    <input type="email" id="registerEmail" placeholder="tu@email.com">
                </div>
                <div class="form-group">
                    <label>Contraseña:</label>
                    <input type="password" id="registerPassword" placeholder="Tu contraseña">
                </div>
                <button class="btn" onclick="register()">Registrarse</button>
                <button class="btn" onclick="toggleAuth()">¿Ya tienes cuenta? Inicia sesión</button>
                <div id="registerError"></div>
            </div>
        </div>

        <!-- Pantalla Principal -->
        <div id="mainScreen" style="display:none;">
            <div class="tabs">
                <button class="tab-btn active" onclick="switchTab('fichas')">📋 Fichas</button>
                <button class="tab-btn" onclick="switchTab('routines')">📅 Rutinas</button>
            </div>

            <!-- Tab: Fichas -->
            <div id="fichasTab" class="tab-content active">
                <h2>Fichas de Estimulación</h2>
                <button class="btn" onclick="loadFichas()">Ver Fichas</button>
                <button class="btn" onclick="downloadAllPDF()">Descargar PDF</button>
                <div id="fichasContent"></div>
            </div>

            <!-- Tab: Rutinas -->
            <div id="routinesTab" class="tab-content">
                <h2>Mis Rutinas Semanales</h2>
                <button class="btn" onclick="openCreateRoutineModal()">+ Crear Rutina</button>
                <div id="routinesList"></div>
            </div>
        </div>
    </div>

    <!-- Modal para crear rutina -->
    <div id="createRoutineModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeCreateRoutineModal()">&times;</span>
            <h2>Crear Nueva Rutina Semanal</h2>
            <div class="form-group">
                <label>Nombre del Niño:</label>
                <input type="text" id="childName" placeholder="Nombre">
            </div>
            <div class="form-group">
                <label>Rango de Edad:</label>
                <select id="ageRange">
                    <option value="">Selecciona</option>
                    <option value="0–3 meses">0-3 meses</option>
                    <option value="3–6 meses">3-6 meses</option>
                    <option value="6–9 meses">6-9 meses</option>
                    <option value="9–12 meses">9-12 meses</option>
                    <option value="13–18 meses">13-18 meses</option>
                    <option value="19–24 meses">19-24 meses</option>
                    <option value="25–36 meses">25-36 meses</option>
                    <option value="37–48 meses">37-48 meses</option>
                    <option value="49–60 meses">49-60 meses</option>
                    <option value="61–72 meses">61-72 meses</option>
                </select>
            </div>
            <div class="form-group">
                <label>Semana #:</label>
                <input type="number" id="weekNumber" placeholder="1" min="1">
            </div>
            <div class="form-group">
                <label>Modelo:</label>
                <select id="modelType">
                    <option value="home">Casa (Tiempo Completo)</option>
                    <option value="school">Escuela (Con Actividades)</option>
                </select>
            </div>
            <button class="btn" onclick="createRoutine()">Crear Rutina</button>
            <div id="routineError"></div>
        </div>
    </div>

    <script>
        const API_URL = 'https://portal-ei.onrender.com/api';
        let token = localStorage.getItem('token');
        let currentUser = JSON.parse(localStorage.getItem('currentUser') || '{}');

        // Inicializar
        window.addEventListener('load', () => {
            if (token && currentUser.name) {
                showMainScreen();
            } else {
                showAuthScreen();
            }
        });

        function showAuthScreen() {
            document.getElementById('authScreen').style.display = 'block';
            document.getElementById('mainScreen').style.display = 'none';
        }

        function showMainScreen() {
            document.getElementById('authScreen').style.display = 'none';
            document.getElementById('mainScreen').style.display = 'block';
            document.getElementById('userName').textContent = 'Hola, ' + (currentUser.name || 'Niñera');
            loadRoutines();
        }

        function toggleAuth() {
            document.getElementById('loginSection').style.display = 
                document.getElementById('loginSection').style.display === 'none' ? 'block' : 'none';
            document.getElementById('registerSection').style.display = 
                document.getElementById('registerSection').style.display === 'none' ? 'block' : 'none';
        }

        async function login() {
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;
            const errorDiv = document.getElementById('loginError');

            if (!email || !password) {
                errorDiv.innerHTML = '<div class="error">Completa todos los campos</div>';
                return;
            }

            try {
                const response = await fetch(`${API_URL}/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });

                const data = await response.json();

                if (response.ok) {
                    token = data.token;
                    currentUser = data.user;
                    localStorage.setItem('token', token);
                    localStorage.setItem('currentUser', JSON.stringify(currentUser));
                    showMainScreen();
                } else {
                    errorDiv.innerHTML = '<div class="error">' + (data.error || 'Error en login') + '</div>';
                }
            } catch (error) {
                errorDiv.innerHTML = '<div class="error">Error: ' + error.message + '</div>';
            }
        }

        async function register() {
            const name = document.getElementById('registerName').value;
            const email = document.getElementById('registerEmail').value;
            const password = document.getElementById('registerPassword').value;
            const errorDiv = document.getElementById('registerError');

            if (!name || !email || !password) {
                errorDiv.innerHTML = '<div class="error">Completa todos los campos</div>';
                return;
            }

            try {
                const response = await fetch(`${API_URL}/auth/register`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, email, password })
                });

                const data = await response.json();

                if (response.ok) {
                    token = data.token;
                    currentUser = data.user;
                    localStorage.setItem('token', token);
                    localStorage.setItem('currentUser', JSON.stringify(currentUser));
                    showMainScreen();
                } else {
                    errorDiv.innerHTML = '<div class="error">' + (data.error || 'Error en registro') + '</div>';
                }
            } catch (error) {
                errorDiv.innerHTML = '<div class="error">Error: ' + error.message + '</div>';
            }
        }

        function logout() {
            localStorage.removeItem('token');
            localStorage.removeItem('currentUser');
            token = null;
            currentUser = {};
            showAuthScreen();
        }

        function switchTab(tabName) {
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(tab => tab.classList.remove('active'));
            event.target.classList.add('active');
            document.getElementById(tabName + 'Tab').classList.add('active');
        }

        async function loadFichas() {
            const content = document.getElementById('fichasContent');
            content.innerHTML = '<div class="loading">Cargando fichas...</div>';

            try {
                const response = await fetch(`${API_URL}/activities`);
                const data = await response.json();

                if (data.data) {
                    let html = '';
                    for (const [ageRange, areas] of Object.entries(data.data)) {
                        html += '<h3 style="margin-top:20px; color:#05b6a8;">' + ageRange + '</h3>';
                        for (const [area, activities] of Object.entries(areas)) {
                            html += '<h4 style="margin-top:10px; color:#666;">' + area + '</h4>';
                            activities.forEach(act => {
                                html += '<div class="card">';
                                html += '<strong>' + act.activity + '</strong><br>';
                                html += '<small>Duración: ' + act.frequency + '</small><br>';
                                html += '<small>Materiales: ' + act.materials + '</small>';
                                html += '</div>';
                            });
                        }
                    }
                    content.innerHTML = html;
                } else {
                    content.innerHTML = '<div class="error">Error al cargar fichas</div>';
                }
            } catch (error) {
                content.innerHTML = '<div class="error">Error: ' + error.message + '</div>';
            }
        }

        async function downloadAllPDF() {
            try {
                const response = await fetch(`${API_URL}/activities`);
                const data = await response.json();

                if (data.data) {
                    let html = '<h1>Fichas de Estimulación Genius Educa</h1>';
                    for (const [ageRange, areas] of Object.entries(data.data)) {
                        html += '<h2 style="page-break-before:always;">' + ageRange + '</h2>';
                        for (const [area, activities] of Object.entries(areas)) {
                            html += '<h3>' + area + '</h3>';
                            activities.forEach(act => {
                                html += '<div style="page-break-inside:avoid; border:1px solid #ccc; padding:10px; margin:10px 0;">';
                                html += '<h4>' + act.activity + '</h4>';
                                html += '<p><strong>Duración:</strong> ' + act.frequency + '</p>';
                                html += '<p><strong>Materiales:</strong> ' + act.materials + '</p>';
                                html += '</div>';
                            });
                        }
                    }
                    const win = window.open('', '', 'width=800,height=600');
                    win.document.write(html);
                    win.document.close();
                    win.print();
                }
            } catch (error) {
                alert('Error: ' + error.message);
            }
        }

        function openCreateRoutineModal() {
            document.getElementById('createRoutineModal').classList.add('active');
        }

        function closeCreateRoutineModal() {
            document.getElementById('createRoutineModal').classList.remove('active');
        }

        async function createRoutine() {
            const childName = document.getElementById('childName').value;
            const ageRange = document.getElementById('ageRange').value;
            const weekNumber = document.getElementById('weekNumber').value;
            const modelType = document.getElementById('modelType').value;
            const errorDiv = document.getElementById('routineError');

            if (!childName || !ageRange || !weekNumber) {
                errorDiv.innerHTML = '<div class="error">Completa todos los campos</div>';
                return;
            }

            try {
                const response = await fetch(`${API_URL}/routines`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': 'Bearer ' + token
                    },
                    body: JSON.stringify({
                        childName,
                        ageRange,
                        weekNumber: parseInt(weekNumber),
                        modelType,
                        routineData: {}
                    })
                });

                const data = await response.json();

                if (response.ok) {
                    errorDiv.innerHTML = '<div class="success">Rutina creada exitosamente</div>';
                    closeCreateRoutineModal();
                    loadRoutines();
                    document.getElementById('childName').value = '';
                    document.getElementById('ageRange').value = '';
                    document.getElementById('weekNumber').value = '';
                } else {
                    errorDiv.innerHTML = '<div class="error">' + (data.error || 'Error al crear rutina') + '</div>';
                }
            } catch (error) {
                errorDiv.innerHTML = '<div class="error">Error: ' + error.message + '</div>';
            }
        }

        async function loadRoutines() {
            const list = document.getElementById('routinesList');
            list.innerHTML = '<div class="loading">Cargando rutinas...</div>';

            try {
                const response = await fetch(`${API_URL}/routines`, {
                    headers: { 'Authorization': 'Bearer ' + token }
                });

                const data = await response.json();

                if (data.routines && data.routines.length > 0) {
                    let html = '';
                    data.routines.forEach(routine => {
                        html += '<div class="card">';
                        html += '<h4>' + routine.child_name + '</h4>';
                        html += '<p>Edad: ' + routine.age_range + ' | Semana: ' + routine.week_number + '</p>';
                        html += '<button class="btn" onclick="deleteRoutine(\'' + routine.id + '\')">Eliminar</button>';
                        html += '</div>';
                    });
                    list.innerHTML = html;
                } else {
                    list.innerHTML = '<p>No tienes rutinas creadas. <button class="btn" onclick="openCreateRoutineModal()">Crear una</button></p>';
                }
            } catch (error) {
                list.innerHTML = '<div class="error">Error: ' + error.message + '</div>';
            }
        }

        async function deleteRoutine(id) {
            if (!confirm('¿Eliminar esta rutina?')) return;

            try {
                const response = await fetch(`${API_URL}/routines/` + id, {
                    method: 'DELETE',
                    headers: { 'Authorization': 'Bearer ' + token }
                });

                if (response.ok) {
                    loadRoutines();
                }
            } catch (error) {
                alert('Error: ' + error.message);
            }
        }

        window.onclick = function(event) {
            const modal = document.getElementById('createRoutineModal');
            if (event.target === modal) {
                modal.classList.remove('active');
            }
        }
    </script>
</body>
</html>
