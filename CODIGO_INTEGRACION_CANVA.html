<!-- JavaScript para controlar el modal -->
<script>
function openGeniusPortal() {
  // IMPORTANTE: Reemplaza "genius-portal-REEMPLAZA-ESTO" con tu URL real de Render
  // Ejemplo: https://genius-portal-abc123.onrender.com
  
  const portalUrl = "https://genius-portal-REEMPLAZA-ESTO.onrender.com/public/index.html";
  
  // Verificar si la URL ha sido actualizada
  if (portalUrl.includes("REEMPLAZA-ESTO")) {
    alert("⚠️ IMPORTANTE: Debes reemplazar 'genius-portal-REEMPLAZA-ESTO' con tu URL real de Render.\n\nEjemplo: https://genius-portal-abc123.onrender.com");
    return;
  }
  
  document.getElementById("geniusPortalModal").style.display = "flex";
  document.getElementById("geniusPortalIframe").src = portalUrl;
}

function closeGeniusPortal() {
  document.getElementById("geniusPortalModal").style.display = "none";
}

// Cerrar modal al hacer clic fuera del contenido
document.addEventListener("click", function(event) {
  const modal = document.getElementById("geniusPortalModal");
  if (event.target === modal) {
    closeGeniusPortal();
  }
});

// Cerrar modal con tecla ESC
document.addEventListener("keydown", function(event) {
  if (event.key === "Escape") {
    closeGeniusPortal();
  }
});
</script>
